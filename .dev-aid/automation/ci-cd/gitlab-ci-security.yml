# Dev-AID Security Scan for GitLab CI
# Copy this file to .gitlab-ci.yml in your project root

stages:
  - security

variables:
  # Tool versions
  GITLEAKS_VERSION: "8.18.4"
  HADOLINT_VERSION: "2.12.0"

# Secret Scanning with Gitleaks
gitleaks:
  stage: security
  image: alpine:latest
  before_script:
    - apk add --no-cache wget tar
    - wget -q https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_amd64.tar.gz
    - tar xzf gitleaks_${GITLEAKS_VERSION}_linux_amd64.tar.gz
    - mv gitleaks /usr/local/bin/
  script:
    - gitleaks detect --verbose --report-path gitleaks-report.json --exit-code 0
    - |
      LEAKS=$(cat gitleaks-report.json | wc -l)
      if [ "$LEAKS" -gt 2 ]; then
        echo "❌ Secrets detected!"
        exit 1
      else
        echo "✅ No secrets found"
      fi
  artifacts:
    reports:
      sast: gitleaks-report.json
    paths:
      - gitleaks-report.json
    expire_in: 30 days
  allow_failure: false

# SAST with Opengrep
opengrep:
  stage: security
  image: python:3.11-slim
  before_script:
    - curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash
    - export PATH="$HOME/.local/bin:$PATH"
  script:
    - opengrep scan --config=auto --json --output opengrep-report.json .
    - opengrep scan --config=auto --sarif --output gl-sast-report.json .
  artifacts:
    reports:
      sast: gl-sast-report.json
    paths:
      - opengrep-report.json
      - gl-sast-report.json
    expire_in: 30 days
  allow_failure: false

# Dependency Vulnerability Scanning with Trivy
trivy-dependencies:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy fs --scanners vuln --severity HIGH,CRITICAL --format json --output trivy-fs-report.json .
    - trivy fs --scanners vuln --severity HIGH,CRITICAL --format template --template "@contrib/gitlab.tpl" --output gl-dependency-scanning-report.json .
    - |
      VULNS=$(cat trivy-fs-report.json | jq '[.Results[]?.Vulnerabilities[]?] | length')
      if [ "$VULNS" -gt 0 ]; then
        echo "⚠️ $VULNS vulnerability(ies) found"
      else
        echo "✅ No vulnerabilities found"
      fi
  artifacts:
    reports:
      dependency_scanning: gl-dependency-scanning-report.json
    paths:
      - trivy-fs-report.json
      - gl-dependency-scanning-report.json
    expire_in: 30 days
  allow_failure: true

# Container Scanning with Trivy
trivy-container:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache docker-cli
  script:
    - |
      if [ -f "Dockerfile" ]; then
        docker build -t $CI_PROJECT_NAME:$CI_COMMIT_SHORT_SHA .
        trivy image --severity HIGH,CRITICAL --format json --output trivy-image-report.json $CI_PROJECT_NAME:$CI_COMMIT_SHORT_SHA
        trivy image --severity HIGH,CRITICAL --format template --template "@contrib/gitlab.tpl" --output gl-container-scanning-report.json $CI_PROJECT_NAME:$CI_COMMIT_SHORT_SHA
      else
        echo "No Dockerfile found, skipping container scan"
      fi
  artifacts:
    reports:
      container_scanning: gl-container-scanning-report.json
    paths:
      - trivy-image-report.json
      - gl-container-scanning-report.json
    expire_in: 30 days
  only:
    exists:
      - Dockerfile
  allow_failure: true

# Dockerfile Linting with Hadolint
hadolint:
  stage: security
  image: alpine:latest
  before_script:
    - apk add --no-cache wget
    - wget -q https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}/hadolint-Linux-x86_64 -O hadolint
    - chmod +x hadolint
    - mv hadolint /usr/local/bin/
  script:
    - hadolint Dockerfile --format json > hadolint-report.json || true
    - |
      ERRORS=$(cat hadolint-report.json | jq '[.[] | select(.level == "error")] | length')
      if [ "$ERRORS" -gt 0 ]; then
        echo "❌ $ERRORS Dockerfile error(s)"
        exit 1
      else
        echo "✅ Dockerfile looks good"
      fi
  artifacts:
    paths:
      - hadolint-report.json
    expire_in: 30 days
  only:
    exists:
      - Dockerfile
  allow_failure: true

# IaC Scanning with Checkov
checkov:
  stage: security
  image: python:3.11-slim
  before_script:
    - pip install checkov
  script:
    - checkov -d . --quiet --compact --output json > checkov-report.json || true
    - checkov -d . --quiet --output junitxml --output-file checkov-junit.xml || true
    - |
      if [ -f "checkov-report.json" ]; then
        FAILED=$(cat checkov-report.json | jq '.summary.failed')
        echo "ℹ️ Checkov: $FAILED check(s) failed"
      fi
  artifacts:
    reports:
      junit: checkov-junit.xml
    paths:
      - checkov-report.json
      - checkov-junit.xml
    expire_in: 30 days
  allow_failure: true

# Security Summary Job
security-summary:
  stage: security
  image: alpine:latest
  needs:
    - gitleaks
    - opengrep
    - trivy-dependencies
  before_script:
    - apk add --no-cache jq
  script:
    - |
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo "  🔒 Security Scan Summary"
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo ""

      # Gitleaks
      if [ -f "gitleaks-report.json" ]; then
        LEAKS=$(cat gitleaks-report.json | wc -l)
        LEAKS=$((LEAKS - 2))  # Remove JSON array brackets
        if [ "$LEAKS" -gt 0 ]; then
          echo "❌ Gitleaks: $LEAKS secret(s) found"
        else
          echo "✅ Gitleaks: No secrets"
        fi
      fi

      # Opengrep
      if [ -f "opengrep-report.json" ]; then
        FINDINGS=$(cat opengrep-report.json | jq '.results | length')
        echo "🔍 Opengrep: $FINDINGS finding(s)"
      fi

      # Trivy
      if [ -f "trivy-fs-report.json" ]; then
        VULNS=$(cat trivy-fs-report.json | jq '[.Results[]?.Vulnerabilities[]?] | length')
        CRITICAL=$(cat trivy-fs-report.json | jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length')
        echo "🛡️ Trivy: $VULNS vulnerability(ies) ($CRITICAL critical)"
      fi

      echo ""
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
  allow_failure: true

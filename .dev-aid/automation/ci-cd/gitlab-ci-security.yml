# Dev-AID Security Scan for GitLab CI
# Tools: Gitleaks (secrets), Trivy (CVE + misconfig + secrets), Opengrep (SAST 340+ rules)
# Copy this file to .gitlab-ci.yml in your project root

stages:
  - security

variables:
  # Tool versions
  GITLEAKS_VERSION: "8.18.4"

# Secret Scanning with Gitleaks
gitleaks:
  stage: security
  image: alpine:latest
  before_script:
    - apk add --no-cache wget tar
    - wget -q https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_amd64.tar.gz
    - tar xzf gitleaks_${GITLEAKS_VERSION}_linux_amd64.tar.gz
    - mv gitleaks /usr/local/bin/
  script:
    - gitleaks detect --verbose --report-path gitleaks-report.json --exit-code 0
    - |
      LEAKS=$(cat gitleaks-report.json | wc -l)
      if [ "$LEAKS" -gt 2 ]; then
        echo "❌ Secrets detected!"
        exit 1
      else
        echo "✅ No secrets found"
      fi
  artifacts:
    reports:
      sast: gitleaks-report.json
    paths:
      - gitleaks-report.json
    expire_in: 30 days
  allow_failure: false

# CVE + Misconfig + Secrets Scanning with Trivy
trivy-comprehensive:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy fs --scanners vuln,misconfig,secret --severity HIGH,CRITICAL --format json --output trivy-fs-report.json .
    - trivy fs --scanners vuln,misconfig,secret --severity HIGH,CRITICAL --format template --template "@contrib/gitlab.tpl" --output gl-dependency-scanning-report.json .
    - |
      VULNS=$(cat trivy-fs-report.json | jq '[.Results[]?.Vulnerabilities[]?] | length')
      MISCONFIGS=$(cat trivy-fs-report.json | jq '[.Results[]?.Misconfigurations[]?] | length')
      SECRETS=$(cat trivy-fs-report.json | jq '[.Results[]?.Secrets[]?] | length')
      echo "🛡️ Trivy: $VULNS CVEs, $MISCONFIGS misconfigs, $SECRETS secrets"

      # Fail on critical CVEs or any secrets
      CRITICAL_CVE=$(cat trivy-fs-report.json | jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length')
      if [ "$CRITICAL_CVE" -gt 0 ] || [ "$SECRETS" -gt 0 ]; then
        echo "❌ Critical issues found!"
        exit 1
      fi
  artifacts:
    reports:
      dependency_scanning: gl-dependency-scanning-report.json
    paths:
      - trivy-fs-report.json
      - gl-dependency-scanning-report.json
    expire_in: 30 days
  allow_failure: false

# Container Scanning with Trivy
trivy-container:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache docker-cli
  script:
    - |
      if [ -f "Dockerfile" ]; then
        docker build -t $CI_PROJECT_NAME:$CI_COMMIT_SHORT_SHA .
        trivy image --scanners vuln,misconfig,secret --severity HIGH,CRITICAL --format json --output trivy-image-report.json $CI_PROJECT_NAME:$CI_COMMIT_SHORT_SHA
        trivy image --scanners vuln,misconfig,secret --severity HIGH,CRITICAL --format template --template "@contrib/gitlab.tpl" --output gl-container-scanning-report.json $CI_PROJECT_NAME:$CI_COMMIT_SHORT_SHA
      else
        echo "No Dockerfile found, skipping container scan"
      fi
  artifacts:
    reports:
      container_scanning: gl-container-scanning-report.json
    paths:
      - trivy-image-report.json
      - gl-container-scanning-report.json
    expire_in: 30 days
  only:
    exists:
      - Dockerfile
  allow_failure: true

# SAST with Opengrep (340+ rules)
opengrep:
  stage: security
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y curl
    - curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash
    - export PATH="$HOME/.local/bin:$HOME/.opengrep/bin:$PATH"
  script:
    - |
      opengrep scan \
        --config=p/default \
        --config=p/security-audit \
        --config=p/secrets \
        --config=p/ci \
        --config=p/cwe-top-25 \
        --json --output opengrep-report.json .
    - |
      FINDINGS=$(cat opengrep-report.json | jq '.results | length')
      ERRORS=$(cat opengrep-report.json | jq '[.results[] | select(.extra.severity == "ERROR")] | length')
      echo "🔍 Opengrep: $FINDINGS finding(s) ($ERRORS critical)"

      if [ "$ERRORS" -gt 0 ]; then
        echo "❌ Critical code vulnerabilities found!"
        exit 1
      fi
  artifacts:
    paths:
      - opengrep-report.json
    expire_in: 30 days
  allow_failure: false

# Security Summary Job
security-summary:
  stage: security
  image: alpine:latest
  needs:
    - gitleaks
    - trivy-comprehensive
    - opengrep
  before_script:
    - apk add --no-cache jq
  script:
    - |
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo "  🔒 Security Scan Summary (3 tools)"
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      echo ""

      # Gitleaks
      if [ -f "gitleaks-report.json" ]; then
        LEAKS=$(cat gitleaks-report.json | wc -l)
        LEAKS=$((LEAKS - 2))  # Remove JSON array brackets
        if [ "$LEAKS" -gt 0 ]; then
          echo "❌ Gitleaks: $LEAKS secret(s) found"
        else
          echo "✅ Gitleaks: No secrets"
        fi
      fi

      # Trivy
      if [ -f "trivy-fs-report.json" ]; then
        VULNS=$(cat trivy-fs-report.json | jq '[.Results[]?.Vulnerabilities[]?] | length')
        MISCONFIGS=$(cat trivy-fs-report.json | jq '[.Results[]?.Misconfigurations[]?] | length')
        SECRETS=$(cat trivy-fs-report.json | jq '[.Results[]?.Secrets[]?] | length')
        CRITICAL=$(cat trivy-fs-report.json | jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length')
        echo "🛡️ Trivy: $VULNS CVEs ($CRITICAL critical), $MISCONFIGS misconfigs, $SECRETS secrets"
      fi

      # Opengrep
      if [ -f "opengrep-report.json" ]; then
        FINDINGS=$(cat opengrep-report.json | jq '.results | length')
        ERRORS=$(cat opengrep-report.json | jq '[.results[] | select(.extra.severity == "ERROR")] | length')
        echo "🔍 Opengrep: $FINDINGS finding(s) ($ERRORS critical) - 340+ rules"
      fi

      echo ""
      echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
  allow_failure: true

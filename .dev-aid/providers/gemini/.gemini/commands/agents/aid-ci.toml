name = "aid-ci"
description = "Short alias for dev-aid-agent-ci-fix — CI failure diagnosis"

[metadata]
category = "agents"
author = "Dev-AID Team"
version = "1.0.0"

[prompt]
content = """
# CI Fix (Short Alias)

This is a short alias for the full `dev-aid-agent-ci-fix` command.

**Read and follow all instructions from:** `.dev-aid/providers/gemini/.gemini/commands/agents/dev-aid-agent-ci-fix.toml`

Load that file now and execute the CI debugging workflow. The user's input is the run ID or PR number.
"""

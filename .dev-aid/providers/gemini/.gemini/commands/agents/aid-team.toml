name = "aid-team"
description = "Run multi-agent teams — PR review, security audit, architecture, issue resolution"

[metadata]
category = "agents"
author = "Dev-AID Team (https://probably.group)"
version = "1.0.0"

[prompt]
content = """
# Team Command (Short Alias)

This is a short alias for the full `dev-aid-agent-team` command.

**Read and follow all instructions from:** `.dev-aid/providers/gemini/.gemini/commands/agents/dev-aid-agent-team.toml`

Load that file now and execute the team workflow. The user's input contains the team name, message, and options.
"""

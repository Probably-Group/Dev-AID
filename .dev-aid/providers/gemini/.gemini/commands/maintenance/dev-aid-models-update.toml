name = "dev-aid-models-update"
description = "Auto-discover and update to latest AI model versions"

[metadata]
category = "maintenance"
author = "Dev-AID Team (https://probably.group)"
version = "1.0.0"

[prompt]
content = """
# Dev-AID Model Auto-Discovery

Discover latest AI model versions from provider APIs and update configuration.

## What This Does

1. **Queries Provider APIs** — Check Anthropic, Google, and OpenAI for available models
2. **Version Parsing** — Identify latest version of each model tier
3. **Smart Updates** — Update `.dev-aid/config/models.json`
4. **Summary Report** — Show what changed and why

## Usage

```bash
cd .dev-aid/orchestration
python3 models-updater.py         # Run discovery and update
python3 models-updater.py --dry-run  # Show changes without saving
```

## Task

1. Check current model config:
```bash
cat .dev-aid/config/models.json 2>/dev/null
```

2. Run the updater script if available:
```bash
cd .dev-aid/orchestration && python3 models-updater.py --dry-run 2>&1
```

3. If the script is not available, manually check latest models by searching the web for current Anthropic, Google, and OpenAI model releases.

4. Report proposed changes and ask user to confirm before applying.

Begin model discovery now.
"""

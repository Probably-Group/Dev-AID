description = "Execute with Challenger mode - Claude generates, Gemini reviews for security issues"

prompt = """
# 🔍 Challenger Mode Execution

You are the **Challenger** in a two-AI review workflow. Your role is to provide critical security review.

## User's Request
{{args}}

## Your Task: Critical Security Review

The primary AI (Claude) will generate an implementation for the above request. Your job is to:

### 1. Analyze for OWASP Top 10 Vulnerabilities
- Injection flaws (SQL, XSS, Command injection)
- Broken authentication
- Sensitive data exposure
- XML external entities (XXE)
- Broken access control
- Security misconfiguration
- Cross-site scripting (XSS)
- Insecure deserialization
- Using components with known vulnerabilities
- Insufficient logging & monitoring

### 2. Check for Logic Errors
- Race conditions
- Off-by-one errors
- Null pointer exceptions
- Edge cases not handled

### 3. Identify Performance Issues
- N+1 queries
- Inefficient algorithms
- Memory leaks

### 4. Verify Best Practices
- Input validation
- Rate limiting
- Error handling
- Secret management

## Context from Dev-AID

**Memory Bank:**
!{cat .dev-aid/memory-bank/security.md 2>/dev/null || echo "No security context available"}

**Recent Changes:**
!{git diff --name-only HEAD~3..HEAD 2>/dev/null || echo "No recent changes"}

**Active Configuration:**
!{cat .dev-aid/config/routing.json 2>/dev/null || echo "No routing config"}

## Output Format Required

Provide your critique in this EXACT format:

```
ISSUES FOUND: <number>
SEVERITY: <LOW|MEDIUM|HIGH|CRITICAL>

DETAILED CRITIQUE:
1. [Issue description]
   Location: [file:line or code snippet]
   Risk: [security/performance/logic]
   Impact: [what could go wrong]

2. [Next issue...]

RECOMMENDATIONS:
- [Specific fix for issue 1]
- [Specific fix for issue 2]
...

POSITIVE ASPECTS:
- [What was done well]
```

**Important:** Be thorough but constructive. If the implementation is solid, acknowledge it. If there are critical issues, be explicit about the risks.
"""

name = "aid-skills"
description = "List Dev-AID skills and host-project skills installed in this project"

[prompt]
content = """
# Dev-AID Skills

Show a categorized list of every skill available in this project — both
Dev-AID scaffold skills and host-project skills (if any) — with brief
descriptions, collision warnings, and the precedence rule.

## Instructions

### Detect host-project skills

Before listing Dev-AID skills, check whether the host project has its own
skills directory. Look in these locations (in order):

- `skills/` at the repo root
- `.claude/skills/`
- `docs/skills/`

A host-project skill is any directory containing a `SKILL.md` file.
If none of these directories exist, skip the host-project section.

### Collect Dev-AID skills

Read the skills registry index if it exists:

`.dev-aid/skills/registry/skills-index.json`

Otherwise walk these directories:

- Expert skills  — `.dev-aid/skills/expert/*/SKILL.md`
- Process skills — `.dev-aid/skills/process/*/SKILL.md`
- Core skills    — `.dev-aid/skills/core/*/SKILL.md`

Extract `name` and `description` from each SKILL.md frontmatter.

### Detect name collisions

Compare host-project skill directory names against Dev-AID skill names.
Flag collisions with a warning symbol.

### Render output (use actual counts)

```
Skills Overview

## Host Project Skills (N)
- <skill-name>: <description>
- <skill-name>: <description> WARNING: name collision with .dev-aid/skills/expert/<same-name>
...

Precedence: host-project skills take priority over Dev-AID skills.

---

## Dev-AID Expert (N)
- <skill-name>: <description>
...

## Dev-AID Process (N)
- <skill-name>: <description>
...

## Dev-AID Core (N)
- <skill-name>: <description>
...

Skills auto-load based on the files you're working with. The session-start
hook suggests up to 3 skills per session.

Architecture: .dev-aid/docs/SKILLS-ARCHITECTURE.md
```

### Filters

If a filter argument is provided: `host`, `expert`, `process`, `core`, or
`collisions` — only show that subset.

### Precedence rule

Host-project skills take priority over Dev-AID skills with the same name.
The host-project copy is authoritative; the Dev-AID copy is the upstream
default that may have been intentionally overridden.

Keep output concise — one line per skill, no walls of text.
"""

# Security Scan Job Template
# This template provides comprehensive security scanning with 3 tools:
# 1. Gitleaks - Secret scanning (git history + current files)
# 2. Trivy - CVE + Misconfig + Secrets (dependencies, Dockerfiles, IaC)
# 3. Opengrep - SAST with 340+ rules (OWASP, CWE Top 25, CI/CD security)
#
# IMPORTANT: This template ensures ALL critical findings fail the workflow.
# No 'continue-on-error' is used - security failures block merges.
#
# Include this in your CI workflow by copying the 'security' job below.

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # For SARIF uploads (optional, works without)

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for Gitleaks

      - name: Install Opengrep
        run: |
          # Install Opengrep (open-source Semgrep fork) via official method - latest
          curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.opengrep/bin" >> $GITHUB_PATH

      - name: Run Gitleaks (Secret Scanning)
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true  # We check results manually below
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: "latest"

      - name: Run Trivy (CVE + Misconfig + Secrets)
        uses: aquasecurity/trivy-action@0.33.1
        continue-on-error: true  # We check results manually below
        with:
          version: latest
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,misconfig,secret'  # Comprehensive: CVEs + Dockerfiles/IaC + secrets
          format: 'json'
          output: 'trivy-fs.json'
          severity: 'HIGH,CRITICAL'

      - name: Build Docker Image (if Dockerfile exists)
        if: hashFiles('Dockerfile') != ''
        continue-on-error: true
        run: docker build -t temp-image:latest .

      - name: Run Trivy (Container Scanning)
        if: hashFiles('Dockerfile') != ''
        uses: aquasecurity/trivy-action@0.33.1
        continue-on-error: true
        with:
          version: latest
          scan-type: 'image'
          image-ref: 'temp-image:latest'
          scanners: 'vuln,misconfig,secret'
          format: 'json'
          output: 'trivy-image.json'
          severity: 'HIGH,CRITICAL'

      - name: Run Opengrep (SAST - 340+ rules)
        id: opengrep
        continue-on-error: true  # We check results manually below
        run: |
          # Comprehensive rulesets (340+ rules):
          # - p/default: Semgrep curated defaults
          # - p/security-audit: Comprehensive security patterns
          # - p/secrets: Hardcoded credentials
          # - p/ci: CI/CD security (GitHub Actions)
          # - p/cwe-top-25: MITRE CWE Top 25
          opengrep \
            --config=p/default \
            --config=p/security-audit \
            --config=p/secrets \
            --config=p/ci \
            --config=p/cwe-top-25 \
            --json --output=opengrep.json .

      - name: Upload security reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            *-report.json
            *.json
          retention-days: 30

      - name: Generate Security Summary
        if: always()
        run: |
          echo "# 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Gitleaks
          if [ -f "gitleaks-report.json" ]; then
            LEAKS=$(jq 'length' gitleaks-report.json)
            if [ "$LEAKS" -gt 0 ]; then
              echo "## ❌ Gitleaks: $LEAKS secret(s) found" >> $GITHUB_STEP_SUMMARY
            else
              echo "## ✅ Gitleaks: No secrets found" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          # Trivy
          if [ -f "trivy-fs.json" ]; then
            VULNS=$(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy-fs.json)
            MISCONFIGS=$(jq '[.Results[]?.Misconfigurations[]?] | length' trivy-fs.json)
            SECRETS=$(jq '[.Results[]?.Secrets[]?] | length' trivy-fs.json)
            echo "## 🛡️ Trivy: $VULNS CVEs, $MISCONFIGS misconfigs, $SECRETS secrets" >> $GITHUB_STEP_SUMMARY
          fi

          # Opengrep
          if [ -f "opengrep.json" ]; then
            FINDINGS=$(jq '.results | length' opengrep.json)
            echo "## 🔍 Opengrep: $FINDINGS finding(s) (340+ rules)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for critical issues
        if: always()
        run: |
          CRITICAL_ISSUES=0

          # Check Gitleaks - check if results file exists and contains findings
          if [ -f "gitleaks-report.json" ]; then
            LEAKS=$(jq 'length' gitleaks-report.json)
            if [ "$LEAKS" -gt 0 ]; then
              echo "❌ $LEAKS secret(s) found!"
              CRITICAL_ISSUES=$((CRITICAL_ISSUES + 1))
            fi
          elif [ "${{ steps.gitleaks.outcome }}" = "failure" ]; then
            echo "❌ Gitleaks scan failed!"
            CRITICAL_ISSUES=$((CRITICAL_ISSUES + 1))
          fi

          # Check Trivy for CRITICAL CVEs, misconfigs, and secrets
          if [ -f "trivy-fs.json" ]; then
            CRITICAL_CVE=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-fs.json)
            CRITICAL_MISCONFIG=$(jq -r '[.Results[]?.Misconfigurations[]? | select(.Severity == "CRITICAL")] | length' trivy-fs.json)
            SECRETS=$(jq -r '[.Results[]?.Secrets[]?] | length' trivy-fs.json)

            if [ "$CRITICAL_CVE" -gt 0 ]; then
              echo "❌ $CRITICAL_CVE critical CVEs!"
              CRITICAL_ISSUES=$((CRITICAL_ISSUES + 1))
            fi
            if [ "$CRITICAL_MISCONFIG" -gt 0 ]; then
              echo "❌ $CRITICAL_MISCONFIG critical misconfigurations!"
              CRITICAL_ISSUES=$((CRITICAL_ISSUES + 1))
            fi
            if [ "$SECRETS" -gt 0 ]; then
              echo "❌ $SECRETS secrets found in files!"
              CRITICAL_ISSUES=$((CRITICAL_ISSUES + 1))
            fi
          fi

          # Check Opengrep for ERROR severity
          if [ -f "opengrep.json" ]; then
            CRITICAL=$(jq -r '[.results[] | select(.extra.severity == "ERROR")] | length' opengrep.json)
            if [ "$CRITICAL" -gt 0 ]; then
              echo "❌ $CRITICAL critical code vulnerabilities!"
              CRITICAL_ISSUES=$((CRITICAL_ISSUES + 1))
            fi
          fi

          if [ $CRITICAL_ISSUES -gt 0 ]; then
            echo ""
            echo "🚨 $CRITICAL_ISSUES critical security issue(s) found!"
            echo "Review the security reports and fix before merging."
            exit 1
          else
            echo "✅ No critical security issues found!"
          fi

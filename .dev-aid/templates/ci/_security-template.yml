# Security Scan Job Template
# This template provides comprehensive security scanning with 5 tools:
# 1. Gitleaks - Secret scanning
# 2. Opengrep - SAST (Static Application Security Testing)
# 3. Trivy - Dependency/CVE scanning
# 4. Hadolint - Dockerfile linting (if Dockerfile exists)
# 5. Checkov - IaC security scanning
#
# IMPORTANT: This template ensures ALL critical findings fail the workflow.
# No 'continue-on-error' is used - security failures block merges.
#
# Include this in your CI workflow by copying the 'security' job below.

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # For SARIF uploads (optional, works without)

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for Gitleaks

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Security Tools
        run: |
          # Install Checkov (latest stable)
          pip install checkov
          # Install Opengrep (open-source Semgrep fork) via official method - latest
          curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.opengrep/bin" >> $GITHUB_PATH

      - name: Run Gitleaks (Secret Scanning)
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true  # We check results manually below
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: "latest"

      - name: Run Opengrep (SAST)
        id: opengrep
        continue-on-error: true  # We check results manually below
        run: |
          # Use strict rulesets for security, quality, and secrets
          opengrep \
            --config=p/security-audit \
            --config=p/owasp-top-10 \
            --config=p/secrets \
            --json --output=semgrep.json .

      - name: Run Trivy (Dependency Scanning)
        uses: aquasecurity/trivy-action@0.33.1
        continue-on-error: true  # We check results manually below
        with:
          version: latest
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,config,secret'  # Comprehensive: vulnerabilities + misconfigurations + secrets
          format: 'json'
          output: 'trivy-fs.json'
          severity: 'HIGH,CRITICAL'

      - name: Build Docker Image (if Dockerfile exists)
        if: hashFiles('Dockerfile') != ''
        continue-on-error: true
        run: docker build -t temp-image:latest .

      - name: Run Trivy (Container Scanning)
        if: hashFiles('Dockerfile') != ''
        uses: aquasecurity/trivy-action@0.33.1
        continue-on-error: true
        with:
          version: latest
          scan-type: 'image'
          image-ref: 'temp-image:latest'
          scanners: 'vuln,config,secret'  # Comprehensive: vulnerabilities + misconfigurations + secrets
          format: 'json'
          output: 'trivy-image.json'
          severity: 'HIGH,CRITICAL'

      - name: Run Hadolint (Dockerfile Linting)
        id: hadolint
        uses: hadolint/hadolint-action@v3.3.0
        continue-on-error: true
        if: hashFiles('Dockerfile') != ''
        with:
          dockerfile: Dockerfile
          format: json
          no-fail: true
          failure-threshold: warning  # Catch warnings + errors (not just errors)

      - name: Run Checkov (IaC Scanning)
        id: checkov
        continue-on-error: true
        run: |
          checkov -d . --download-external-modules --quiet --compact --output json > checkov-report.json || true

      - name: Upload security reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            *-report.json
            *.json
          retention-days: 30

      - name: Generate Security Summary
        if: always()
        run: |
          echo "# 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Gitleaks
          if [ -f "gitleaks-report.json" ]; then
            LEAKS=$(jq 'length' gitleaks-report.json)
            if [ "$LEAKS" -gt 0 ]; then
              echo "## ❌ Gitleaks: $LEAKS secret(s) found" >> $GITHUB_STEP_SUMMARY
            else
              echo "## ✅ Gitleaks: No secrets found" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          # Opengrep
          if [ -f "semgrep.json" ]; then
            FINDINGS=$(jq '.results | length' semgrep.json)
            echo "## 🔍 Opengrep: $FINDINGS finding(s)" >> $GITHUB_STEP_SUMMARY
          fi

          # Trivy
          if [ -f "trivy-fs.json" ]; then
            VULNS=$(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy-fs.json)
            echo "## 🛡️ Trivy: $VULNS vulnerability(ies)" >> $GITHUB_STEP_SUMMARY
          fi

          # Hadolint
          if [ -f "hadolint-report.json" ]; then
            ISSUES=$(jq 'length' hadolint-report.json)
            echo "## 🐳 Hadolint: $ISSUES Dockerfile issue(s)" >> $GITHUB_STEP_SUMMARY
          fi

          # Checkov
          if [ -f "checkov-report.json" ]; then
            FAILED=$(jq 'if type == "array" then length else .summary.failed // 0 end' checkov-report.json)
            echo "## ☸️ Checkov: $FAILED IaC check(s) failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for critical issues
        if: always()
        run: |
          CRITICAL_ISSUES=0

          # Check Gitleaks - check if results file exists and contains findings
          if [ -f "gitleaks-report.json" ]; then
            LEAKS=$(jq 'length' gitleaks-report.json)
            if [ "$LEAKS" -gt 0 ]; then
              echo "❌ $LEAKS secret(s) found!"
              CRITICAL_ISSUES=$((CRITICAL_ISSUES + 1))
            fi
          elif [ "${{ steps.gitleaks.outcome }}" = "failure" ]; then
            echo "❌ Gitleaks scan failed!"
            CRITICAL_ISSUES=$((CRITICAL_ISSUES + 1))
          fi

          # Check Opengrep for ERROR severity
          if [ -f "semgrep.json" ]; then
            CRITICAL=$(jq -r '[.results[] | select(.extra.severity == "ERROR")] | length' semgrep.json)
            if [ "$CRITICAL" -gt 0 ]; then
              echo "❌ $CRITICAL critical code vulnerabilities!"
              CRITICAL_ISSUES=$((CRITICAL_ISSUES + 1))
            fi
          fi

          # Check Trivy for CRITICAL CVEs
          if [ -f "trivy-fs.json" ]; then
            CRITICAL_CVE=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-fs.json)
            if [ "$CRITICAL_CVE" -gt 0 ]; then
              echo "❌ $CRITICAL_CVE critical CVEs!"
              CRITICAL_ISSUES=$((CRITICAL_ISSUES + 1))
            fi
          fi

          # Check Hadolint for ERROR severity issues
          if [ -f "hadolint-report.json" ]; then
            ERRORS=$(jq -r '[.[] | select(.level == "error")] | length' hadolint-report.json 2>/dev/null || echo "0")
            if [ "$ERRORS" -gt 0 ]; then
              echo "❌ $ERRORS critical Dockerfile issue(s)!"
              CRITICAL_ISSUES=$((CRITICAL_ISSUES + 1))
            fi
          fi

          # Check Checkov for CRITICAL/HIGH severity failures
          if [ -f "checkov-report.json" ]; then
            CHECKOV_TYPE=$(jq -r 'type' checkov-report.json)
            if [ "$CHECKOV_TYPE" = "object" ]; then
              CRITICAL_IaC=$(jq -r '[.results.failed_checks[]? | select(.severity == "CRITICAL" or .severity == "HIGH")] | length' checkov-report.json 2>/dev/null || echo "0")
              if [ "$CRITICAL_IaC" -gt 0 ]; then
                echo "❌ $CRITICAL_IaC critical/high IaC issue(s)!"
                CRITICAL_ISSUES=$((CRITICAL_ISSUES + 1))
              fi
            fi
          fi

          if [ $CRITICAL_ISSUES -gt 0 ]; then
            echo ""
            echo "🚨 $CRITICAL_ISSUES critical security issue(s) found!"
            echo "Review the security reports and fix before merging."
            exit 1
          else
            echo "✅ No critical security issues found!"
          fi

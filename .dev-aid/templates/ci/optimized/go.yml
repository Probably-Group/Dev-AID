name: CI (Optimized)

# Optimized for speed:
# - Concurrency groups (cancel outdated runs)
# - Explicit build cache (faster compilation)
# - Parallel linting execution (gofmt + go vet)
# - Explicit ubuntu-22.04 (2-5s savings per job)

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Cancel outdated workflow runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy.sarif'

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        go-version: ['1.21', '1.22', '1.23']

    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Cache Go build
        uses: actions/cache@v3
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ matrix.go-version }}-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-${{ matrix.go-version }}-

      - name: Format check & Vet (parallel)
        run: |
          # Run format check
          gofmt -l . > /tmp/gofmt.out &
          FMT_PID=$!

          # Run vet
          go vet ./... &
          VET_PID=$!

          # Wait for both
          wait $FMT_PID $VET_PID

          # Check if gofmt found issues
          if [ -s /tmp/gofmt.out ]; then
            echo "Go files not formatted:"
            cat /tmp/gofmt.out
            exit 1
          fi

      - name: Build
        run: go build -v ./...

      - name: Test with race detector
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.go-version == '1.23'
        with:
          file: ./coverage.txt

name: CI (Optimized)

# Optimized for speed:
# - Concurrency groups (cancel outdated runs)
# - Maven/Gradle cache (faster dependency resolution)
# - Parallel builds (-T 1C for Maven)
# - Explicit ubuntu-22.04 (2-5s savings per job)

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Cancel outdated workflow runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy.sarif'

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        java-version: [11, 17, 21]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with parallel compilation
        run: {{BUILD_COMMAND}} -T 1C

      - name: Run tests
        run: {{TEST_COMMAND}}

      - name: Lint
        run: {{LINT_COMMAND}}
        continue-on-error: true

      - name: Generate coverage report
        run: {{COVERAGE_COMMAND}}
        if: matrix.java-version == '21'

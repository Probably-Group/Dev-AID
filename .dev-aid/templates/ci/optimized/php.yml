name: CI (Optimized)

# Optimized for speed:
# - Concurrency groups (cancel outdated runs)
# - Composer cache (faster dependency installation)
# - Parallel linting (phpcs + psalm/phpstan if available)
# - Explicit ubuntu-22.04 (2-5s savings per job)

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Cancel outdated workflow runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: "latest"

      - name: Run Trivy
        uses: aquasecurity/trivy-action@0.33.1
        with:
          version: latest
          scanners: 'vuln,config,secret'
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy.sarif'

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: {{INSTALL_COMMAND}}

      - name: Lint (parallel if multiple tools)
        run: {{LINT_COMMAND}}

      - name: Test
        run: {{TEST_COMMAND}}

      - name: Generate coverage
        run: {{COVERAGE_COMMAND}}
        if: matrix.php-version == '8.3'

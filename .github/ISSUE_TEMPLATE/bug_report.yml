name: Bug Report
description: Report something that's not working correctly
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug
      placeholder: Describe the issue...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: I expected...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run command '...'
        2. See error...
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Dev-AID is affected?
      options:
        - Router (Multi-AI orchestration)
        - RAG (Local semantic search)
        - Skills (Core or Expert)
        - Security (Git hooks, scanners)
        - Automation (Issue/Conflict resolution)
        - CI/CD Generator
        - Installation/Setup
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Dev-AID Version
      description: Run `cat .dev-aid/VERSION` to find this
      placeholder: "1.3.0-beta.9"
    validations:
      required: true

  - type: dropdown
    id: ai-tool
    attributes:
      label: AI Tool
      description: Which AI tool are you using?
      options:
        - Claude Code
        - Cursor
        - Gemini CLI
        - Other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Windows (native)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/errors
      description: Paste any error messages or logs
      render: shell

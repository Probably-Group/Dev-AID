name: PR Check (Optimized)

# Optimized for speed:
# - Dependency caching (full venv caching)
# - Concurrency groups (cancel outdated runs)
# - Minimal installs (only what's needed)
# - Shared setup job to avoid redundant installs
# - Fast-fail strategy

on:
  pull_request:
    branches: [main, master, develop]
    paths:
      - '**.py'
      - '**.sh'
      - '.github/workflows/**'
      - '.dev-aid/**'
  push:
    branches: [main, master, develop]
    paths:
      - '**.py'
      - '**.sh'
      - '.github/workflows/**'
      - '.dev-aid/**'

# Cancel outdated workflow runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Setup job: Install dependencies once, cache for all jobs
  setup:
    name: Setup Dependencies
    runs-on: ubuntu-22.04  # Explicit version, slightly faster than 'latest'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.dev-aid/orchestration/requirements.txt'

      - name: Cache virtual environment
        id: cache-venv
        uses: actions/cache@v3
        with:
          path: .dev-aid/orchestration/.venv
          key: venv-${{ runner.os }}-py3.11-${{ hashFiles('.dev-aid/orchestration/requirements.txt') }}
          restore-keys: |
            venv-${{ runner.os }}-py3.11-

      - name: Install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          cd .dev-aid/orchestration
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==8.3.4 pytest-cov==5.0.0
          pip install black==24.10.0 isort==5.13.2 flake8==7.1.1
          pip install mypy==1.13.0 types-requests==2.32.0.20241016

  python-lint:
    name: Python Lint
    runs-on: ubuntu-22.04
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore cached venv
        uses: actions/cache@v3
        with:
          path: .dev-aid/orchestration/.venv
          key: venv-${{ runner.os }}-py3.11-${{ hashFiles('.dev-aid/orchestration/requirements.txt') }}

      - name: Run linting checks
        run: |
          cd .dev-aid/orchestration
          source .venv/bin/activate

          # Run in parallel with & and wait
          black --check --diff . &
          ISORT_PID=$!

          isort --check-only --diff . &
          FLAKE8_PID=$!

          flake8 . --max-line-length=120 --extend-ignore=E203,W503 &
          BLACK_PID=$!

          # Wait for all to complete
          wait $ISORT_PID $FLAKE8_PID $BLACK_PID

  python-test:
    name: Python Unit Tests
    runs-on: ubuntu-22.04
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore cached venv
        uses: actions/cache@v3
        with:
          path: .dev-aid/orchestration/.venv
          key: venv-${{ runner.os }}-py3.11-${{ hashFiles('.dev-aid/orchestration/requirements.txt') }}

      - name: Run tests
        run: |
          cd .dev-aid/orchestration
          source .venv/bin/activate
          pytest tests/ -v -n auto  # Use pytest-xdist for parallel test execution

  type-check:
    name: Type Check
    runs-on: ubuntu-22.04
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore cached venv
        uses: actions/cache@v3
        with:
          path: .dev-aid/orchestration/.venv
          key: venv-${{ runner.os }}-py3.11-${{ hashFiles('.dev-aid/orchestration/requirements.txt') }}

      - name: Run MyPy
        run: |
          cd .dev-aid/orchestration
          source .venv/bin/activate
          mypy router --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  bash-lint:
    name: Bash Lint
    runs-on: ubuntu-22.04
    # Bash lint doesn't need Python setup, runs independently

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Shellcheck
        uses: ludeeus/action-shellcheck@master
        continue-on-error: true
        with:
          scandir: '.dev-aid'
          severity: warning
          ignore_paths: '.dev-aid/orchestration/venv .dev-aid/orchestration/.venv'

  pr-check-summary:
    name: PR Check Summary
    runs-on: ubuntu-22.04
    needs: [python-lint, python-test, type-check, bash-lint]
    if: always()

    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.python-lint.result }}" == "failure" || \
                "${{ needs.python-test.result }}" == "failure" ]]; then
            echo "❌ PR checks failed!"
            exit 1
          else
            echo "✅ All PR checks passed!"
            if [[ "${{ needs.bash-lint.result }}" == "failure" ]]; then
              echo "⚠️  Shellcheck warnings present (non-blocking)"
            fi
          fi

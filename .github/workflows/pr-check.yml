name: PR Check

# Optimized for free-tier CI minutes:
# - Ubuntu-only (cross-platform testing in release-gate.yml)
# - Dependency caching (full venv caching)
# - Concurrency groups (cancel outdated runs)
# - Shared setup job
# - Fast-fail strategy

on:
  pull_request:
    branches: [main, master, develop]
    paths:
      - '**.py'
      - '**.sh'
      - '.github/workflows/**'
      - '.dev-aid/**'
  push:
    branches: [main, master, develop]
    paths:
      - '**.py'
      - '**.sh'
      - '.github/workflows/**'
      - '.dev-aid/**'

# Cancel outdated workflow runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup Dependencies
    runs-on: ubuntu-22.04
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.dev-aid/orchestration/requirements.txt'

      - name: Set up Node.js (for TOON SDK)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache virtual environment
        id: cache-venv
        uses: actions/cache@v3
        with:
          path: .dev-aid/orchestration/.venv
          key: venv-Linux-py3.11-${{ hashFiles('.dev-aid/orchestration/requirements.txt') }}-v2
          restore-keys: |
            venv-Linux-py3.11-

      - name: Install dependencies
        run: |
          cd .dev-aid/orchestration
          if [ ! -d ".venv" ]; then
            python -m venv .venv
          fi
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==8.3.4 pytest-cov==5.0.0 pytest-xdist
          pip install black==24.10.0 isort==5.13.2 flake8==7.1.1
          pip install mypy==1.13.0 types-requests==2.32.0.20241016

      - name: Install TOON SDK
        run: |
          cd .dev-aid/orchestration
          npm install

  python-lint:
    name: Python Lint
    runs-on: ubuntu-22.04
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Restore cached venv
        uses: actions/cache@v3
        with:
          path: .dev-aid/orchestration/.venv
          key: venv-Linux-py3.11-${{ hashFiles('.dev-aid/orchestration/requirements.txt') }}-v2

      - name: Run linting checks
        run: |
          cd .dev-aid/orchestration
          source .venv/bin/activate

          # Run in parallel with & and wait
          black --check --diff . &
          BLACK_PID=$!

          isort --check-only --diff . &
          ISORT_PID=$!

          flake8 . --max-line-length=120 --extend-ignore=E203,W503 --exclude .venv &
          FLAKE8_PID=$!

          # Wait for all to complete
          wait $BLACK_PID $ISORT_PID $FLAKE8_PID

  python-test:
    name: Python Unit Tests
    runs-on: ubuntu-22.04
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Restore cached venv
        uses: actions/cache@v3
        with:
          path: .dev-aid/orchestration/.venv
          key: venv-Linux-py3.11-${{ hashFiles('.dev-aid/orchestration/requirements.txt') }}-v2

      - name: Run tests
        run: |
          cd .dev-aid/orchestration
          source .venv/bin/activate
          pytest tests/ -v -n auto

  type-check:
    name: Type Check
    runs-on: ubuntu-22.04
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Restore cached venv
        uses: actions/cache@v3
        with:
          path: .dev-aid/orchestration/.venv
          key: venv-Linux-py3.11-${{ hashFiles('.dev-aid/orchestration/requirements.txt') }}-v2

      - name: Run MyPy
        run: |
          cd .dev-aid/orchestration
          source .venv/bin/activate
          mypy router --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-22.04
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Restore cached venv
        uses: actions/cache@v3
        with:
          path: .dev-aid/orchestration/.venv
          key: venv-Linux-py3.11-${{ hashFiles('.dev-aid/orchestration/requirements.txt') }}-v2

      - name: Run E2E tests
        run: |
          cd .dev-aid/orchestration
          source .venv/bin/activate
          pytest tests/test_e2e.py -v -m "not slow" --no-cov

  bash-lint:
    name: Bash Lint
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Shellcheck
        uses: ludeeus/action-shellcheck@master
        continue-on-error: true
        with:
          scandir: '.dev-aid'
          severity: warning
          ignore_paths: '.dev-aid/orchestration/venv .dev-aid/orchestration/.venv'

  pr-check-summary:
    name: PR Check Summary
    runs-on: ubuntu-22.04
    needs: [python-lint, python-test, type-check, e2e-test, bash-lint]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "Checking test results..."

          # Treat skipped/cancelled as non-failure (handles billing limits)
          LINT="${{ needs.python-lint.result }}"
          TEST="${{ needs.python-test.result }}"
          E2E="${{ needs.e2e-test.result }}"
          TYPE="${{ needs.type-check.result }}"
          BASH="${{ needs.bash-lint.result }}"

          echo "Python Lint: $LINT"
          echo "Python Test: $TEST"
          echo "E2E Test: $E2E"
          echo "Type Check: $TYPE"
          echo "Bash Lint: $BASH"

          # Only fail on actual failures, not skipped/cancelled
          if [[ "$LINT" == "failure" || "$TEST" == "failure" || "$E2E" == "failure" ]]; then
            echo "::error::PR checks failed!"
            exit 1
          fi

          echo "All critical PR checks passed (or were skipped)."

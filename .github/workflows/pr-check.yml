name: PR Check

# Fast feedback loop for pull requests
# Only runs checks relevant to changed files
on:
  pull_request:
    branches: [main, master, develop]
    paths:
      - '**.py'
      - '**.sh'
      - '.github/workflows/**'
      - '.dev-aid/**'
  push:
    branches: [main, master, develop]
    paths:
      - '**.py'
      - '**.sh'
      - '.github/workflows/**'
      - '.dev-aid/**'

jobs:
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install linting tools
        run: |
          pip install black==24.10.0 isort==5.13.2 flake8==7.1.1

      - name: Run Black
        run: |
          black --check --diff .dev-aid/orchestration

      - name: Run Isort
        run: |
          isort --check-only --diff .dev-aid/orchestration

      - name: Run Flake8
        run: |
          flake8 .dev-aid/orchestration --max-line-length=120 --extend-ignore=E203,W503

  python-test:
    name: Python Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pytest==8.3.4 pytest-cov==6.0.0
          pip install -r .dev-aid/orchestration/requirements.txt

      - name: Run Pytest
        run: |
          pytest .dev-aid/orchestration/tests/ -v --cov=.dev-aid/orchestration/router --cov-report=term-missing
        continue-on-error: false

  bash-lint:
    name: Bash Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.dev-aid'
          severity: warning
          ignore_paths: '.dev-aid/orchestration/venv .dev-aid/orchestration/.venv'

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install mypy==1.13.0 types-requests==2.32.0.20241016
          pip install -r .dev-aid/orchestration/requirements.txt

      - name: Run Mypy
        run: |
          mypy .dev-aid/orchestration/router --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  pr-check-summary:
    name: PR Check Summary
    runs-on: ubuntu-latest
    needs: [python-lint, python-test, bash-lint, type-check]
    if: always()

    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.python-lint.result }}" == "failure" || \
                "${{ needs.python-test.result }}" == "failure" || \
                "${{ needs.bash-lint.result }}" == "failure" ]]; then
            echo "❌ PR checks failed!"
            exit 1
          else
            echo "✅ All PR checks passed!"
          fi

name: Release Gate

# Deep validation before publishing releases
# Ensures production stability
on:
  release:
    types: [created, published]
  workflow_dispatch:
    inputs:
      target_version:
        description: 'Version to validate (e.g., v1.2.0)'
        required: false
        default: 'main'

permissions:
  contents: read
  # security-events: write  # Disabled for private repo compatibility

jobs:
  deep-security:
    name: Deep Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for Gitleaks

      - name: Run Gitleaks (Full History)
        # Gitleaks doesn't support 'release' event, skip for releases
        if: github.event_name != 'release'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: "latest"

      - name: Run Trivy (Filesystem - JSON)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          version: latest
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,config,secret'  # Comprehensive: vulnerabilities + misconfigurations + secrets
          format: 'json'
          output: 'trivy-release-fs.json'
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'

      # SARIF upload disabled for private repo compatibility
      # - name: Upload Trivy results
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: always()
      #   with:
      #     sarif_file: 'trivy-release-fs.sarif'

      - name: Install Opengrep
        run: |
          curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run Opengrep SAST (340+ Rules)
        continue-on-error: true
        run: |
          # Comprehensive SAST with 5 rulesets (340+ rules):
          # - p/default: Semgrep curated defaults
          # - p/security-audit: Comprehensive security patterns
          # - p/secrets: Hardcoded credentials
          # - p/ci: CI/CD security (GitHub Actions, etc)
          # - p/cwe-top-25: MITRE CWE Top 25 vulnerabilities
          $HOME/.local/bin/opengrep scan \
            --config p/default \
            --config p/security-audit \
            --config p/secrets \
            --config p/ci \
            --config p/cwe-top-25 \
            --json --output opengrep-release.json . || true

      - name: Security Summary
        if: always()
        run: |
          echo "# 🔒 Release Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Trivy Results
          if [ -f "trivy-release-fs.json" ]; then
            CRITICAL=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-release-fs.json)
            HIGH=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-release-fs.json)
            MEDIUM=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity == "MEDIUM")] | length' trivy-release-fs.json)

            echo "## 📊 Trivy - Vulnerability Count" >> $GITHUB_STEP_SUMMARY
            echo "- 🔴 Critical: $CRITICAL" >> $GITHUB_STEP_SUMMARY
            echo "- 🟠 High: $HIGH" >> $GITHUB_STEP_SUMMARY
            echo "- 🟡 Medium: $MEDIUM" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$CRITICAL" -gt 0 ]; then
              echo "❌ **RELEASE BLOCKED**: Critical CVEs found!" >> $GITHUB_STEP_SUMMARY
              TRIVY_BLOCK=1
            fi
          fi

          # Opengrep Results
          if [ -f "opengrep-release.json" ]; then
            SAST_TOTAL=$(jq -r '.results | length' opengrep-release.json 2>/dev/null || echo "0")
            SAST_ERROR=$(jq -r '[.results[] | select(.extra.severity == "ERROR")] | length' opengrep-release.json 2>/dev/null || echo "0")
            SAST_WARNING=$(jq -r '[.results[] | select(.extra.severity == "WARNING")] | length' opengrep-release.json 2>/dev/null || echo "0")

            echo "## 🔍 Opengrep - SAST Findings (340+ rules)" >> $GITHUB_STEP_SUMMARY
            echo "- 🔴 Error: $SAST_ERROR" >> $GITHUB_STEP_SUMMARY
            echo "- 🟡 Warning: $SAST_WARNING" >> $GITHUB_STEP_SUMMARY
            echo "- Total: $SAST_TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$SAST_ERROR" -gt 0 ]; then
              echo "⚠️ **Warning**: $SAST_ERROR SAST error(s) found (review recommended)" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "## 🔍 Opengrep - SAST" >> $GITHUB_STEP_SUMMARY
            echo "✅ No SAST findings or scan did not run" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Final verdict
          if [ "${TRIVY_BLOCK:-0}" = "1" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **RELEASE BLOCKED**: Critical security issues found!" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  cross-platform-tests:
    name: Cross-Platform Tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11']
        exclude:
          # Windows tests are slower, only test latest Python
          - os: windows-latest
            python-version: '3.10'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pytest==8.3.4
          pip install -r .dev-aid/orchestration/requirements.txt

      - name: Run tests
        run: |
          pytest .dev-aid/orchestration/tests/ -v
        continue-on-error: false

      - name: Test context detector
        shell: bash
        run: |
          python .dev-aid/orchestration/context-detector.py detect .
          python .dev-aid/orchestration/context-detector.py select "python fastapi" 5

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: write  # To upload release assets

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Generate SBOM with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          version: latest
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'sbom-cyclonedx.json'

      - name: Generate SBOM with Trivy (SPDX format)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          version: latest
          scan-type: 'fs'
          scan-ref: '.'
          format: 'spdx-json'
          output: 'sbom-spdx.json'

      - name: Archive SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifacts
          path: |
            sbom-cyclonedx.json
            sbom-spdx.json
          retention-days: 90

      - name: Upload SBOM to Release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ github.event.release.tag_name }}"

          # Upload both formats to release
          gh release upload "$TAG_NAME" sbom-cyclonedx.json --clobber
          gh release upload "$TAG_NAME" sbom-spdx.json --clobber

          echo "✅ SBOMs uploaded to release $TAG_NAME"

      - name: SBOM Summary
        if: always()
        run: |
          echo "# 📦 SBOM Generation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "sbom-cyclonedx.json" ]; then
            # Count dependencies
            TOTAL_DEPS=$(jq -r '.components | length' sbom-cyclonedx.json)
            echo "- **Total Components**: $TOTAL_DEPS" >> $GITHUB_STEP_SUMMARY

            # Show top dependencies
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Top Dependencies:" >> $GITHUB_STEP_SUMMARY
            jq -r '.components[:10] | .[] | "- \(.name)@\(.version // "unknown")"' sbom-cyclonedx.json >> $GITHUB_STEP_SUMMARY

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ SBOM generated in CycloneDX and SPDX formats" >> $GITHUB_STEP_SUMMARY
          fi

  docs-check:
    name: Documentation Link Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Lychee (Link Checker)
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            --verbose
            --no-progress
            --accept 200,429,403
            --timeout 10
            --max-retries 3
            --exclude 'http://testserver'
            --exclude 'https://slsa.dev'
            --exclude 'https://medium.com'
            --exclude 'https://www.talos.dev'
            --exclude 'https://www.a11yproject.com'
            --exclude '/home/user/'
            --exclude '.dev-aid/providers/claude/.claude'
            --exclude 'owasp.org/www-community/attacks'
            './**/*.md'
            '.dev-aid/skills/**/*.md'
            'README.md'
            'CHANGELOG.md'
          fail: false

      - name: Link Check Summary
        if: always()
        run: |
          echo "# 🔗 Documentation Link Check" >> $GITHUB_STEP_SUMMARY
          if [ -f "lychee/out.md" ]; then
            cat lychee/out.md >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ All links valid!" >> $GITHUB_STEP_SUMMARY
          fi

  release-gate-summary:
    name: Release Gate Summary
    runs-on: ubuntu-latest
    needs: [deep-security, cross-platform-tests, sbom-generation, docs-check]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "# 🚀 Release Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          SECURITY="${{ needs.deep-security.result }}"
          CROSS_PLATFORM="${{ needs.cross-platform-tests.result }}"
          SBOM="${{ needs.sbom-generation.result }}"
          DOCS="${{ needs.docs-check.result }}"

          echo "- 🔒 Security Scan: **$SECURITY**" >> $GITHUB_STEP_SUMMARY
          echo "- 🖥️  Cross-Platform Tests: **$CROSS_PLATFORM**" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 SBOM Generation: **$SBOM**" >> $GITHUB_STEP_SUMMARY
          echo "- 📚 Docs Link Check: **$DOCS**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "$SECURITY" == "failure" || "$CROSS_PLATFORM" == "failure" || "$SBOM" == "failure" ]]; then
            echo "❌ **RELEASE GATE FAILED**" >> $GITHUB_STEP_SUMMARY
            echo "Do not publish this release until all checks pass." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **RELEASE GATE PASSED**" >> $GITHUB_STEP_SUMMARY
            echo "This release is ready for production." >> $GITHUB_STEP_SUMMARY

            if [[ "$DOCS" == "failure" ]]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "⚠️  **Warning**: Documentation link check failed (non-blocking)" >> $GITHUB_STEP_SUMMARY
            fi
          fi

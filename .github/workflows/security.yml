name: Dev-AID Security Scan

# Comprehensive security scan for releases, version tags, and scheduled maintenance
# Runs on: releases, version tags, manual trigger, and weekly schedule
# For PR checks, see pr-check.yml (faster, lighter validation)
on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v1.0.0, v2.1.3, etc.)
    # Only run on main/master when security-critical files change
    branches: [main, master]
    paths:
      - '.github/workflows/security.yml'
      - '**/requirements.txt'
      - '**/package.json'
      - '**/package-lock.json'
      - '**/Gemfile'
      - '**/Gemfile.lock'
      - '**/go.mod'
      - '**/go.sum'
      - 'Dockerfile'
      - '.dockerignore'
      - '.dev-aid/config/**'
  release:
    types: [published, created]
  # Allow manual triggers
  workflow_dispatch:
  # Weekly scheduled scan (Monday at 2 AM UTC)
  schedule:
    - cron: '0 2 * * 1'

jobs:
  security-scan:
    name: Comprehensive Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # security-events: write # Disabled for private repos without Advanced Security
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Security Tools
        run: |
          pip install checkov semgrep
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run Gitleaks (Secret Scanning)
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Semgrep (SAST)
        id: semgrep
        continue-on-error: true
        run: |
          # Use explicit, strict rulesets instead of --config=auto
          # This ensures high-value security and quality checks specific to our stack
          semgrep scan \
            --config=p/security-audit \
            --config=p/python \
            --config=p/bash \
            --config=p/owasp-top-10 \
            --config=p/secrets \
            --sarif --output=semgrep.sarif .
          semgrep scan \
            --config=p/security-audit \
            --config=p/python \
            --config=p/bash \
            --config=p/owasp-top-10 \
            --config=p/secrets \
            --json --output=semgrep.json .

      - name: Run Trivy (Dependency Scanning - JSON)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-fs.json'
          severity: 'HIGH,CRITICAL'

      - name: Build Docker Image
        if: hashFiles('Dockerfile') != ''
        continue-on-error: true
        run: docker build -t temp-image:latest .

      - name: Run Trivy (Container Scanning - JSON)
        if: hashFiles('Dockerfile') != ''
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'image'
          image-ref: 'temp-image:latest'
          format: 'json'
          output: 'trivy-image.json'
          severity: 'HIGH,CRITICAL'

      - name: Run Hadolint (Dockerfile Linting)
        id: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        continue-on-error: true
        if: hashFiles('Dockerfile') != ''
        with:
          dockerfile: Dockerfile
          format: json
          no-fail: true

      - name: Run Checkov (IaC Scanning)
        id: checkov
        continue-on-error: true
        run: |
          checkov -d . --quiet --compact --output json > checkov-report.json || true

      # Disabled SARIF upload for private repo compatibility
      # - name: Upload SARIF results
      #   uses: github/codeql-action/upload-sarif@v3
      #   ...

      - name: Upload security reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            *-report.json
            *.sarif
            *.json
          retention-days: 30

      - name: Generate Security Summary
        if: always()
        run: |
          echo "# 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Gitleaks
          if [ -f "gitleaks-report.json" ]; then
            LEAKS=$(jq 'length' gitleaks-report.json)
            if [ "$LEAKS" -gt 0 ]; then
              echo "## ❌ Gitleaks: $LEAKS secret(s) found" >> $GITHUB_STEP_SUMMARY
            else
              echo "## ✅ Gitleaks: No secrets found" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          # Semgrep
          if [ -f "semgrep.json" ]; then
            FINDINGS=$(jq '.results | length' semgrep.json)
            echo "## 🔍 Semgrep: $FINDINGS finding(s)" >> $GITHUB_STEP_SUMMARY
          fi

          # Trivy
          if [ -f "trivy-fs.json" ]; then
            VULNS=$(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy-fs.json)
            echo "## 🛡️ Trivy: $VULNS vulnerability(ies)" >> $GITHUB_STEP_SUMMARY
          fi

          # Hadolint
          if [ -f "hadolint-report.json" ]; then
            ISSUES=$(jq 'length' hadolint-report.json)
            echo "## 🐳 Hadolint: $ISSUES Dockerfile issue(s)" >> $GITHUB_STEP_SUMMARY
          fi

          # Checkov
          if [ -f "checkov-report.json" ]; then
            FAILED=$(jq 'if type == "array" then length else .summary.failed // 0 end' checkov-report.json)
            echo "## ☸️ Checkov: $FAILED IaC check(s) failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for critical issues
        if: always()
        run: |
          CRITICAL_ISSUES=0

          # Check Gitleaks
          if [ "$GITLEAKS_FAILED" = "true" ]; then
            echo "❌ Secrets found!"
            CRITICAL_ISSUES=$((CRITICAL_ISSUES + 1))
          fi

          # Check Semgrep for ERROR severity
          if [ -f "semgrep.json" ]; then
            CRITICAL=$(jq -r '[.results[] | select(.extra.severity == "ERROR")] | length' semgrep.json)
            if [ "$CRITICAL" -gt 0 ]; then
              echo "❌ $CRITICAL critical code vulnerabilities!"
              CRITICAL_ISSUES=$((CRITICAL_ISSUES + 1))
            fi
          fi

          # Check Trivy for CRITICAL CVEs
          if [ -f "trivy-fs.json" ]; then
            CRITICAL_CVE=$(jq -r '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-fs.json)
            if [ "$CRITICAL_CVE" -gt 0 ]; then
              echo "❌ $CRITICAL_CVE critical CVEs!"
              CRITICAL_ISSUES=$((CRITICAL_ISSUES + 1))
            fi
          fi

          if [ $CRITICAL_ISSUES -gt 0 ]; then
            echo ""
            echo "🚨 $CRITICAL_ISSUES critical security issue(s) found!"
            echo "Review the security reports and fix before merging."
            exit 1
          else
            echo "✅ No critical security issues found!"
          fi